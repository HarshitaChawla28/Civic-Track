<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CivicTrack FAQ Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/faq.css">
</head>

<body>

<div class="container">

    <div class="top">

        <button class="back-btn" onclick="window.history.back()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back
        </button>

        <h1>CivicTrack Assistant</h1>
        <p>Ask questions related to complaints, tracking, services and civic support.</p>
    </div>

    <div class="chat-area" id="chatArea">

        <div class="message bot">
            Hello 👋<br><br>
            I am your CivicTrack FAQ Assistant.<br>
            Ask me anything related to complaints or civic services.
        </div>

    </div>

    <div class="quick-questions">

        <button class="quick-btn" onclick="quickAsk('How do I track my complaint?')">Track Complaint</button>

        <button class="quick-btn" onclick="quickAsk('How do I file a complaint?')">File Complaint</button>

        <button class="quick-btn" onclick="quickAsk('What issues can I report?')">Report Issues</button>

        <button class="quick-btn" onclick="quickAsk('How can I contact admin?')">Contact Admin</button>

    </div>

    <div class="input-area">

        <input 
        type="text" 
        id="userInput" 
        placeholder="Ask your question...">

        <button onclick="sendMessage()">Ask</button>

    </div>

</div>

<script>

const chatArea = document.getElementById("chatArea");
const userInput = document.getElementById("userInput");

function addMessage(message, type){

    const div = document.createElement("div");
    div.classList.add("message", type);
    div.innerHTML = message;

    chatArea.appendChild(div);

    chatArea.scrollTop = chatArea.scrollHeight;
}

function getBotReply(question){

    question = question.toLowerCase();

    if(question.includes("track")){
        return "To track your complaint, go to the <b>Track Complaint</b> page and enter your complaint ID.";
    }

    else if(question.includes("file") || question.includes("submit")){
        return "You can file a complaint through the <b>Report Complaint</b> section available on the dashboard.";
    }

    else if(question.includes("water")){
        return "Water related issues can be reported under the <b>Water Department</b> category.";
    }

    else if(question.includes("garbage") || question.includes("waste")){
        return "Garbage complaints are usually resolved within 24-48 hours after submission.";
    }

    else if(question.includes("electricity") || question.includes("light")){
        return "Electricity and street light issues are forwarded to the municipal electrical department.";
    }

    else if(question.includes("contact") || question.includes("admin")){
        return "You can contact the CivicTrack admin through the Help & Support section.";
    }

    else if(question.includes("status")){
        return "Complaint statuses include: Pending, In Progress and Resolved.";
    }

    else if(question.includes("forgot password")){
        return "Use the Forgot Password option on the login page to reset your password.";
    }

    else if(question.includes("issues") || question.includes("report")){
        return "You can report water leakage, garbage overflow, road damage, street light failure and many more civic issues.";
    }

    else{
        return "Sorry, I could not understand your question properly. Please try asking differently.";
    }

}

function sendMessage(){

    const question = userInput.value.trim();

    if(question === ""){
        return;
    }

    addMessage(question, "user");

    setTimeout(() => {

        const reply = getBotReply(question);

        addMessage(reply, "bot");

    }, 700);

    userInput.value = "";

}

function quickAsk(question){

    userInput.value = question;

    sendMessage();

}

userInput.addEventListener("keypress", function(event){

    if(event.key === "Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>
